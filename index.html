<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOC 콘솔 — VOC 전달 자동화 &amp; 대시보드</title>
  <meta name="description" content="CS의 VOC 전달을 이메일에서 전용 입력·대시보드로 전환하고, AI 요약·분류로 UX/PM 파악 시간을 단축하는 내부 콘솔." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">VOC 콘솔</span>
      </div>

      <div class="ws">
        <div class="ws-label">워크스페이스</div>
        <div class="ws-switch" id="ws-switch">
          <button type="button" data-ws="AK"><span class="ws-dot ak"></span>Astell&amp;Kern</button>
          <button type="button" data-ws="Activo"><span class="ws-dot activo"></span>Activo</button>
        </div>
      </div>

      <button class="add-voc" type="button" data-view="cs">＋ Add VOC</button>

      <nav class="nav">
        <div class="nav-sec">메인</div>
        <button type="button" data-view="dashboard"><span class="ic">▦</span> 대시보드</button>
        <button type="button" data-view="board"><span class="ic">▤</span> VOC 보드</button>

        <div class="nav-sec">도구</div>
        <button type="button" data-act="export"><span class="ic">⤓</span> 내보내기 (Excel)</button>
        <button type="button" class="soon" disabled><span class="ic">◷</span> 분석 <span class="badge-soon">준비중</span></button>
        <button type="button" class="soon" disabled><span class="ic">⚙</span> 연동 (레드마인) <span class="badge-soon">준비중</span></button>
      </nav>

      <div class="side-foot">
        <span class="pulse"></span> UX · PM 공용 콘솔
      </div>
    </aside>

    <main class="main" id="root"></main>
  </div>

  <!-- 엑셀 내보내기용 (브라우저에서 .xlsx 생성) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
