<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOC 콘솔 — VOC 전달 자동화 &amp; 대시보드</title>
  <meta name="description" content="CS의 VOC 전달을 이메일에서 전용 입력·대시보드로 전환하고, AI 요약·분류로 UX/PM 파악 시간을 단축하는 내부 콘솔." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="wordmark">
          <span class="dot"></span>
          <span class="name">VOC 콘솔</span>
          <span class="sub">voice-of-customer</span>
        </div>
        <nav class="nav">
          <button data-view="cs">CS 입력</button>
          <button data-view="dashboard">대시보드</button>
        </nav>
        <div class="spacer"></div>
        <div class="role-hint"><span class="pulse"></span> UX · PM 공용 뷰</div>

    </header>
    <main class="main" id="root"></main>
  </div>
  <script src="app.js"></script>

</html>
