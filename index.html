<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOC 콘솔 — VOC 전달 자동화 &amp; 대시보드</title>
  <meta name="description" content="CS의 VOC 전달을 이메일에서 전용 입력·대시보드로 전환하고, AI 요약·분류로 UX/PM 파악 시간을 단축하는 내부 콘솔." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">VOC 콘솔</span>
      </div>

      <div class="ws">
        <div class="ws-label">워크스페이스</div>
        <div class="ws-switch" id="ws-switch">
          <button type="button" data-ws="AK"><span class="ws-dot ak"></span>Astell&amp;Kern</button>
          <button type="button" data-ws="Activo"><span class="ws-dot activo"></span>Activo</button>
        </div>
      </div>

      <button class="add-voc" type="button" data-view="cs">＋ Add VOC</button>

      <nav class="nav">
        <div class="nav-sec">메인</div>
        <button type="button" data-view="dashboard"><span class="ic">▦</span> 대시보드</button>
        <button type="button" data-view="board"><span class="ic">▤</span> VOC 보드</button>
        <button type="button" data-view="calendar"><span class="ic">▥</span> 캘린더</button>

        <div class="nav-sec">도구</div>
        <button type="button" data-act="export"><span class="ic">⤓</span> 내보내기 (Excel)</button>
      </nav>

      <nav class="nav nav-bottom">
        <button type="button" data-view="settings"><span class="ic">⚙</span> 셋팅</button>
      </nav>
    </aside>

    <main class="main">
      <header class="appbar">
        <div class="appbar-spacer"></div>
        <button class="bell" id="bell" type="button" aria-label="알림">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="badge" style="display:none">0</span>
        </button>
        <div class="me-chip" id="me-chip"></div>
      </header>
      <div id="root"></div>
    </main>
  </div>

  <!-- 엑셀 내보내기용 (브라우저에서 .xlsx 생성) -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
